name: Build QMK firmware

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    name: 'QMK Userspace Build'
    uses: qmk/.github/.github/workflows/qmk_userspace_build.yml@main
    with:
      qmk_repo: qmk/qmk_firmware
      qmk_ref: master

  render-layout:
    name: 'Render keymap layout'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout userspace
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install render dependencies
        run: python -m pip install --upgrade pip keymap-drawer

      - name: Generate layout artifacts
        run: |
          python3 "$GITHUB_WORKSPACE/scripts/render_keymap_drawer.py" \
            --keymap "$GITHUB_WORKSPACE/keyboards/bastardkb/dilemma/4x6_4/keymaps/t18n/keymap.c" \
            --wrappers "$GITHUB_WORKSPACE/users/t18n/keyrecords/wrappers.h" \
            --layout "$GITHUB_WORKSPACE/keyboards/bastardkb/dilemma/4x6_4/keymaps/t18n/keymap-layout.yaml" \
            --output "$RUNNER_TEMP/t18n-keymap.yaml"
          keymap draw "$RUNNER_TEMP/t18n-keymap.yaml" > "$RUNNER_TEMP/t18n-keymap.svg"

      - name: Upload layout artifacts
        uses: actions/upload-artifact@v4
        with:
          name: t18n-keymap-layout
          path: |
            ${{ runner.temp }}/t18n-keymap.yaml
            ${{ runner.temp }}/t18n-keymap.svg

  publish:
    name: 'QMK Userspace Publish'
    uses: qmk/.github/.github/workflows/qmk_userspace_publish.yml@main
    if: always() && !cancelled()
    needs: build
